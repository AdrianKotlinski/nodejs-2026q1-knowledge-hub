services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - hub_network
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    command: sh -c "npx prisma migrate deploy && npx prisma db seed"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hub_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: adriankotlinskiepam/knowledge-hub-api:latest
    ports:
      - '4000:4000'
    env_file:
      - .env
    environment:                                                                                                        
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public 
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:4000/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: on-failure
    networks:
      - hub_network
  adminer:
    image: adminer
    profiles:
      - debug
    ports:
      - '8080:8080'
    depends_on:
      - db
    networks:
      - hub_network
    restart: unless-stopped

networks:
  hub_network:
    driver: bridge

volumes:
  postgres_data:
